  (() => {
    const dialog = document.querySelector(".evolution-dialog");
    if (!dialog) return;

    const prompt = dialog.querySelector(".evolution-dialog-prompt");
    const line = dialog.querySelector(".evolution-dialog-title");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    async function typeInto(node, delay) {
      const text = node.dataset.text || node.textContent;
      node.textContent = "";
      for (const char of text) {
        node.textContent += char;
        await new Promise((resolve) => window.setTimeout(resolve, delay));
      }
    }

    async function runTypewriter() {
      dialog.classList.remove("is-complete");

      if (prefersReducedMotion) {
        prompt.textContent = prompt.dataset.text;
        line.textContent = line.dataset.text;
        dialog.classList.add("is-complete");
        return;
      }

      await typeInto(prompt, 70);
      await new Promise((resolve) => window.setTimeout(resolve, 180));
      await typeInto(line, 45);
      dialog.classList.add("is-complete");
    }

    runTypewriter();
  })();

<script>
document.addEventListener('DOMContentLoaded', function () {
  initRotators();
  initFavoriteLines();
  initRandomLines();
  initPageCompanions();
  initResearchBackgrounds();

function initRotators() {
  const rotators = document.querySelectorAll('[data-rotator]');

  rotators.forEach((rotator) => {
    const items = Array.from(rotator.querySelectorAll('.rotator-item'));
    const button = rotator.querySelector('.rotator-next');

    if (!items.length || !button) return;

    let index = items.findIndex((item) => item.classList.contains('is-active'));
    if (index < 0) index = 0;

    syncRotator(items, index);

    button.addEventListener('click', function () {
      index = (index + 1) % items.length;
      syncRotator(items, index);
    });
  });
}

function syncRotator(items, activeIndex) {
  items.forEach((item, index) => {
    const isActive = index === activeIndex;
    item.hidden = !isActive;
    item.classList.toggle('is-active', isActive);
  });
}

function initFavoriteLines() {
  const hearts = document.querySelectorAll('.line-heart');
  if (!hearts.length) return;

  const storageKey = 'favoriteLines.v1';
  let saved = {};

  try {
    saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
  } catch (error) {
    saved = {};
  }

  hearts.forEach((button) => {
    const lineId = button.dataset.lineId;
    if (!lineId) return;

    updateHeart(button, Boolean(saved[lineId]));

    button.addEventListener('click', function () {
      const nextState = !button.classList.contains('is-favorite');
      saved[lineId] = nextState;
      updateHeart(button, nextState);
      localStorage.setItem(storageKey, JSON.stringify(saved));
    });
  });
}

function updateHeart(button, isFavorite) {
  button.classList.toggle('is-favorite', isFavorite);
  button.setAttribute('aria-pressed', isFavorite ? 'true' : 'false');
  button.setAttribute('aria-label', isFavorite ? 'Line saved to favorites' : 'Save this line');
  button.innerHTML = isFavorite ? '&#9829;' : '&#9825;';
}

function initRandomLines() {
  const panels = document.querySelectorAll('.random-line-panel');
  if (!panels.length) return;

  const poemLines = Array.from(document.querySelectorAll('.poem-line')).map((line) => {
    const textNode = line.querySelector('.poem-line-text');
    const poemBody = line.closest('.poem-body');

    return {
      text: textNode ? textNode.textContent.trim() : '',
      poem: poemBody ? poemBody.dataset.poemTitle : ''
    };
  }).filter((line) => line.text);

  if (!poemLines.length) return;

  panels.forEach((panel) => {
    const trigger = panel.querySelector('.random-line-trigger');
    const output = panel.querySelector('[data-random-output]');
    const source = panel.querySelector('[data-random-source]');

    if (!trigger || !output || !source) return;

    const setRandomLine = function () {
      const choice = poemLines[Math.floor(Math.random() * poemLines.length)];
      output.textContent = '"' + choice.text + '"';
      source.textContent = choice.poem ? 'from ' + choice.poem : '';
    };

    trigger.addEventListener('click', setRandomLine);
    setRandomLine();
  });
}

function initPageCompanions() {
  const companions = document.querySelectorAll('[data-page-companion]');
  if (!companions.length) return;

  companions.forEach((figure) => {
    const image = figure.querySelector('img');
    if (!image) {
      figure.hidden = true;
      return;
    }

    const hideFigure = function () {
      figure.hidden = true;
    };

    const showFigure = function () {
      figure.hidden = false;
    };

    if (image.complete) {
      if (image.naturalWidth > 0) {
        showFigure();
      } else {
        hideFigure();
      }
    } else {
      image.addEventListener('load', showFigure, { once: true });
      image.addEventListener('error', hideFigure, { once: true });
    }
  });
}

function initResearchBackgrounds() {
  const stage = document.querySelector('.research-bg-stage');
  const sections = Array.from(document.querySelectorAll('.research-project[data-bg-id]'));
  const backgrounds = Array.from(document.querySelectorAll('.research-bg-stage .research-bg[data-bg-id]'));

  if (!stage || !sections.length || !backgrounds.length) return;

  let frameId = null;

  const applyBlend = function () {
    frameId = null;

    const viewportMid = window.innerHeight / 2;
    const influenceRange = window.innerHeight * 0.9;
    const scoresById = new Map();

    sections.forEach((section) => {
      const rect = section.getBoundingClientRect();
      const sectionMid = rect.top + rect.height / 2;
      const distance = Math.abs(sectionMid - viewportMid);
      const score = Math.max(0, 1 - (distance / influenceRange));
      const bgId = section.dataset.bgId;

      if (!bgId) return;

      const currentScore = scoresById.get(bgId) || 0;
      scoresById.set(bgId, Math.max(currentScore, score));
    });

    const ranked = Array.from(scoresById.entries())
      .map(([bgId, score]) => ({ bgId, score }))
      .sort((a, b) => b.score - a.score);

    const top = ranked[0];
    const second = ranked[1];
    const weights = new Map();

    if (!top || top.score <= 0.001) {
      weights.set('neutral', 1);
    } else if (!second || second.score <= 0.001) {
      weights.set(top.bgId, 1);
    } else {
      const total = top.score + second.score;
      weights.set(top.bgId, top.score / total);
      weights.set(second.bgId, second.score / total);
    }

    backgrounds.forEach((background) => {
      const weight = weights.get(background.dataset.bgId) || 0;
      background.style.opacity = weight.toFixed(3);
    });
  };

  const requestBlend = function () {
    if (frameId !== null) return;
    frameId = window.requestAnimationFrame(applyBlend);
  };

  requestBlend();
  window.addEventListener('scroll', requestBlend, { passive: true });
  window.addEventListener('resize', requestBlend);
}

function initBirdSeparators() {
  const separators = document.querySelectorAll('[data-bird-separator]');
  if (!separators.length) return;

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (prefersReducedMotion) {
    separators.forEach((separator) => separator.classList.add('is-startled'));
    return;
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add('is-startled');
      observer.unobserve(entry.target);
    });
  }, {
    threshold: 0.5,
    rootMargin: '0px 0px -8% 0px'
  });

  separators.forEach((separator) => observer.observe(separator));
}

      window.tippy(el, config); 
    }
    const noterefs = window.document.querySelectorAll('a[role="doc-noteref"]');
    for (var i=0; i<noterefs.length; i++) {
      const ref = noterefs[i];
      tippyHover(ref, function() {
        // use id or data attribute instead here
        let href = ref.getAttribute('data-footnote-href') || ref.getAttribute('href');
        try { href = new URL(href).hash; } catch {}
        const id = href.replace(/^#\/?/, "");
        const note = window.document.getElementById(id);
        if (note) {
          return note.innerHTML;
        } else {
          return "";
        }
      });
    }
    const xrefs = window.document.querySelectorAll('a.quarto-xref');
    const processXRef = (id, note) => {
      // Strip column container classes
      const stripColumnClz = (el) => {
        el.classList.remove("page-full", "page-columns");
        if (el.children) {
          for (const child of el.children) {
            stripColumnClz(child);
          }
        }
      }
      stripColumnClz(note)
      if (id === null || id.startsWith('sec-')) {
        // Special case sections, only their first couple elements
        const container = document.createElement("div");
        if (note.children && note.children.length > 2) {
          container.appendChild(note.children[0].cloneNode(true));
          for (let i = 1; i < note.children.length; i++) {
            const child = note.children[i];
            if (child.tagName === "P" && child.innerText === "") {
              continue;
            } else {
              container.appendChild(child.cloneNode(true));
              break;
            }
          }
          if (window.Quarto?.typesetMath) {
            window.Quarto.typesetMath(container);
          }
          return container.innerHTML
        } else {
          if (window.Quarto?.typesetMath) {
            window.Quarto.typesetMath(note);
          }
          return note.innerHTML;
        }
      } else {
        // Remove any anchor links if they are present
        const anchorLink = note.querySelector('a.anchorjs-link');
        if (anchorLink) {
          anchorLink.remove();
        }
        if (window.Quarto?.typesetMath) {
          window.Quarto.typesetMath(note);
        }
        if (note.classList.contains("callout")) {
          return note.outerHTML;
        } else {
          return note.innerHTML;
        }
      }
    }
    for (var i=0; i<xrefs.length; i++) {
      const xref = xrefs[i];
      tippyHover(xref, undefined, function(instance) {
        instance.disable();
        let url = xref.getAttribute('href');
        let hash = undefined; 
        if (url.startsWith('#')) {
          hash = url;
        } else {
          try { hash = new URL(url).hash; } catch {}
        }
        if (hash) {
          const id = hash.replace(/^#\/?/, "");
          const note = window.document.getElementById(id);
          if (note !== null) {
            try {
              const html = processXRef(id, note.cloneNode(true));
              instance.setContent(html);
            } finally {
              instance.enable();
              instance.show();
            }
          } else {
            // See if we can fetch this
            fetch(url.split('#')[0])
            .then(res => res.text())
            .then(html => {
              const parser = new DOMParser();
              const htmlDoc = parser.parseFromString(html, "text/html");
              const note = htmlDoc.getElementById(id);
              if (note !== null) {
                const html = processXRef(id, note);
                instance.setContent(html);
              } 
            }).finally(() => {
              instance.enable();
              instance.show();
            });
          }
        } else {
          // See if we can fetch a full url (with no hash to target)
          // This is a special case and we should probably do some content thinning / targeting
          fetch(url)
          .then(res => res.text())
          .then(html => {
            const parser = new DOMParser();
            const htmlDoc = parser.parseFromString(html, "text/html");
            const note = htmlDoc.querySelector('main.content');
            if (note !== null) {
              // This should only happen for chapter cross references
              // (since there is no id in the URL)
              // remove the first header
              if (note.children.length > 0 && note.children[0].tagName === "HEADER") {
                note.children[0].remove();
              }
              const html = processXRef(null, note);
              instance.setContent(html);
            } 
          }).finally(() => {
            instance.enable();
            instance.show();
          });
        }
      }, function(instance) {
      });
    }
        let selectedAnnoteEl;
        const selectorForAnnotation = ( cell, annotation) => {
          let cellAttr = 'data-code-cell="' + cell + '"';
          let lineAttr = 'data-code-annotation="' +  annotation + '"';
          const selector = 'span[' + cellAttr + '][' + lineAttr + ']';
          return selector;
        }
        const selectCodeLines = (annoteEl) => {
          const doc = window.document;
          const targetCell = annoteEl.getAttribute("data-target-cell");
          const targetAnnotation = annoteEl.getAttribute("data-target-annotation");
          const annoteSpan = window.document.querySelector(selectorForAnnotation(targetCell, targetAnnotation));
          const lines = annoteSpan.getAttribute("data-code-lines").split(",");
          const lineIds = lines.map((line) => {
            return targetCell + "-" + line;
          })
          let top = null;
          let height = null;
          let parent = null;
          if (lineIds.length > 0) {
              //compute the position of the single el (top and bottom and make a div)
              const el = window.document.getElementById(lineIds[0]);
              top = el.offsetTop;
              height = el.offsetHeight;
              parent = el.parentElement.parentElement;
            if (lineIds.length > 1) {
              const lastEl = window.document.getElementById(lineIds[lineIds.length - 1]);
              const bottom = lastEl.offsetTop + lastEl.offsetHeight;
              height = bottom - top;
            }
            if (top !== null && height !== null && parent !== null) {
              // cook up a div (if necessary) and position it 
              let div = window.document.getElementById("code-annotation-line-highlight");
              if (div === null) {
                div = window.document.createElement("div");
                div.setAttribute("id", "code-annotation-line-highlight");
                div.style.position = 'absolute';
                parent.appendChild(div);
              }
              div.style.top = top - 2 + "px";
              div.style.height = height + 4 + "px";
              div.style.left = 0;
              let gutterDiv = window.document.getElementById("code-annotation-line-highlight-gutter");
              if (gutterDiv === null) {
                gutterDiv = window.document.createElement("div");
                gutterDiv.setAttribute("id", "code-annotation-line-highlight-gutter");
                gutterDiv.style.position = 'absolute';
                const codeCell = window.document.getElementById(targetCell);
                const gutter = codeCell.querySelector('.code-annotation-gutter');
                gutter.appendChild(gutterDiv);
              }
              gutterDiv.style.top = top - 2 + "px";
              gutterDiv.style.height = height + 4 + "px";
            }
            selectedAnnoteEl = annoteEl;
          }
        };
        const unselectCodeLines = () => {
          const elementsIds = ["code-annotation-line-highlight", "code-annotation-line-highlight-gutter"];
          elementsIds.forEach((elId) => {
            const div = window.document.getElementById(elId);
            if (div) {
              div.remove();
            }
          });
          selectedAnnoteEl = undefined;
        };
          // Handle positioning of the toggle
      window.addEventListener(
        "resize",
        throttle(() => {
          elRect = undefined;
          if (selectedAnnoteEl) {
            selectCodeLines(selectedAnnoteEl);
          }
        }, 10)
      );
      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
      }
        // Attach click handler to the DT
        const annoteDls = window.document.querySelectorAll('dt[data-target-cell]');
        for (const annoteDlNode of annoteDls) {
          annoteDlNode.addEventListener('click', (event) => {
            const clickedEl = event.target;
            if (clickedEl !== selectedAnnoteEl) {
              unselectCodeLines();
              const activeEl = window.document.querySelector('dt[data-target-cell].code-annotation-active');
              if (activeEl) {
                activeEl.classList.remove('code-annotation-active');
              }
              selectCodeLines(clickedEl);
              clickedEl.classList.add('code-annotation-active');
            } else {
              // Unselect the line
              unselectCodeLines();
              clickedEl.classList.remove('code-annotation-active');
            }
          });
        }
    const findCites = (el) => {
      const parentEl = el.parentElement;
      if (parentEl) {
        const cites = parentEl.dataset.cites;
        if (cites) {
          return {
            el,
            cites: cites.split(' ')
          };
        } else {
          return findCites(el.parentElement)
        }
      } else {
        return undefined;
      }
    };
    var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
    for (var i=0; i<bibliorefs.length; i++) {
      const ref = bibliorefs[i];
      const citeInfo = findCites(ref);
      if (citeInfo) {
        tippyHover(citeInfo.el, function() {
          var popup = window.document.createElement('div');
          citeInfo.cites.forEach(function(cite) {
            var citeDiv = window.document.createElement('div');
            citeDiv.classList.add('hanging-indent');
            citeDiv.classList.add('csl-entry');
            var biblioDiv = window.document.getElementById('ref-' + cite);
            if (biblioDiv) {
              citeDiv.innerHTML = biblioDiv.innerHTML;
            }
            popup.appendChild(citeDiv);
          });
          return popup.innerHTML;
        });
      }
    }
  });
