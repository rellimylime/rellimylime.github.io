name: eds220-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - ipykernel          # required for Quarto to use this as a Jupyter kernel
  - xarray=2024.10.0
  - rioxarray=0.14.1
  - rasterio
  - geopandas=0.14.4
  - pandas
  - numpy=1.24.3
  - matplotlib=3.7.1
  - netcdf4
  - scipy
  - scikit-learn
  - shapely
  - pyproj
  - fiona
  - contextily
  - folium
  - mapclassify
  - pip:
      - planetary-computer
      - pystac-client
      - pystac
